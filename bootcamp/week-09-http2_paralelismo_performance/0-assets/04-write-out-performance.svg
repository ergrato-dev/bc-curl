<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="400" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Write-Out: Profiling de Performance</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Cada fase del request tiene su variable --write-out. Medilas para diagnosticar cuellos de botella.</text>

  <!-- Timeline -->
  <text x="40" y="82" fill="#79c0ff" font-size="14" font-weight="bold">Fases de un request HTTP</text>
  <rect x="40" y="97" width="720" height="45" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="55" y="118" fill="#f0883e" font-size="10">time_namelookup</text>
  <text x="180" y="118" fill="#8b949e" font-size="12">→</text>
  <text x="200" y="118" fill="#79c0ff" font-size="10">time_connect</text>
  <text x="320" y="118" fill="#8b949e" font-size="12">→</text>
  <text x="340" y="118" fill="#d2a8ff" font-size="10">time_appconnect</text>
  <text x="490" y="118" fill="#8b949e" font-size="12">→</text>
  <text x="510" y="118" fill="#3fb950" font-size="10">time_starttransfer</text>
  <text x="670" y="118" fill="#8b949e" font-size="12">→</text>
  <text x="690" y="118" fill="#f0f6fc" font-size="10">time_total</text>
  <text x="55" y="138" fill="#8b949e" font-size="9">DNS</text>
  <text x="200" y="138" fill="#8b949e" font-size="9">TCP</text>
  <text x="340" y="138" fill="#8b949e" font-size="9">TLS</text>
  <text x="510" y="138" fill="#8b949e" font-size="9">TTFB (server)</text>
  <text x="690" y="138" fill="#8b949e" font-size="9">Transfer</text>

  <!-- Variables grid -->
  <text x="40" y="172" fill="#79c0ff" font-size="14" font-weight="bold">Variables clave</text>

  <rect x="40" y="187" width="168" height="40" rx="5" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="124" y="205" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="bold">time_namelookup</text>
  <text x="124" y="222" text-anchor="middle" fill="#8b949e" font-size="9">resolución DNS</text>

  <rect x="220" y="187" width="168" height="40" rx="5" fill="#161b22" stroke="#79c0ff" stroke-width="1"/>
  <text x="304" y="205" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="bold">time_connect</text>
  <text x="304" y="222" text-anchor="middle" fill="#8b949e" font-size="9">TCP handshake</text>

  <rect x="400" y="187" width="168" height="40" rx="5" fill="#161b22" stroke="#d2a8ff" stroke-width="1"/>
  <text x="484" y="205" text-anchor="middle" fill="#d2a8ff" font-size="10" font-weight="bold">time_appconnect</text>
  <text x="484" y="222" text-anchor="middle" fill="#8b949e" font-size="9">TLS handshake</text>

  <rect x="580" y="187" width="180" height="40" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="670" y="205" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">time_starttransfer</text>
  <text x="670" y="222" text-anchor="middle" fill="#8b949e" font-size="9">TTFB (primer byte)</text>

  <!-- Diagnostics -->
  <text x="40" y="258" fill="#79c0ff" font-size="14" font-weight="bold">Diagnóstico por fase</text>

  <rect x="40" y="273" width="345" height="30" rx="4" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="55" y="293" fill="#f0883e" font-size="10">DNS lento → usar --resolve o DNS cache</text>

  <rect x="410" y="273" width="350" height="30" rx="4" fill="#161b22" stroke="#79c0ff" stroke-width="1"/>
  <text x="425" y="293" fill="#79c0ff" font-size="10">TCP lento → revisar latencia de red, geolocalización</text>

  <rect x="40" y="313" width="345" height="30" rx="4" fill="#161b22" stroke="#d2a8ff" stroke-width="1"/>
  <text x="55" y="333" fill="#d2a8ff" font-size="10">TLS lento → reutilizar sesiones TLS, HTTP/2</text>

  <rect x="410" y="313" width="350" height="30" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="425" y="333" fill="#3fb950" font-size="10">TTFB alto → servidor procesando lento, optimizar backend</text>

  <!-- Percentiles -->
  <rect x="40" y="358" width="720" height="34" rx="4" fill="#162340"/>
  <text x="55" y="374" fill="#79c0ff" font-size="10" font-weight="bold">Métricas de distribución: </text>
  <text x="210" y="374" fill="#8b949e" font-size="10">p50 (mediana) · p90 (90% debajo de este valor) · p99 (outliers) — más robustas que el promedio</text>
  <text x="55" y="389" fill="#8b949e" font-size="10">awk: ordenar tiempos → idx = int(N * 0.50 / 0.90 / 0.99) → valores[idx]</text>
</svg>
