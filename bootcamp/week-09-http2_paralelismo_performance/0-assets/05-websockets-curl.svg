<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="380" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">WebSockets con curl</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Protocolo full-duplex sobre TCP. curl verifica el handshake de upgrade HTTP → WS.</text>

  <!-- Handshake -->
  <text x="40" y="82" fill="#79c0ff" font-size="14" font-weight="bold">Handshake HTTP → WebSocket (curl puede hacerlo)</text>

  <rect x="40" y="97" width="345" height="100" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="212" y="118" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">Request (curl envía)</text>
  <text x="55" y="140" fill="#8b949e" font-family="'Courier New', monospace" font-size="9">GET /ws HTTP/1.1</text>
  <text x="55" y="157" fill="#8b949e" font-family="'Courier New', monospace" font-size="9">Upgrade: websocket</text>
  <text x="55" y="174" fill="#8b949e" font-family="'Courier New', monospace" font-size="9">Connection: Upgrade</text>
  <text x="55" y="191" fill="#8b949e" font-family="'Courier New', monospace" font-size="9">Sec-WebSocket-Key: base64(16 rand bytes)</text>

  <text x="405" y="150" fill="#8b949e" font-size="18">→</text>

  <rect x="425" y="97" width="335" height="100" rx="6" fill="#0d2f1a" stroke="#3fb950" stroke-width="1.5"/>
  <text x="592" y="118" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">Response (servidor responde)</text>
  <text x="440" y="140" fill="#8b949e" font-family="'Courier New', monospace" font-size="9">HTTP/1.1 101 Switching Protocols</text>
  <text x="440" y="157" fill="#8b949e" font-family="'Courier New', monospace" font-size="9">Upgrade: websocket</text>
  <text x="440" y="174" fill="#8b949e" font-family="'Courier New', monospace" font-size="9">Connection: Upgrade</text>
  <text x="440" y="191" fill="#3fb950" font-family="'Courier New', monospace" font-size="9">Sec-WebSocket-Accept: SHA1(key + GUID)</text>

  <!-- curl commands -->
  <text x="40" y="225" fill="#79c0ff" font-size="14" font-weight="bold">Verificar handshake con curl</text>

  <rect x="40" y="240" width="720" height="32" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="55" y="261" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">curl -i -N -H "Upgrade: websocket" -H "Connection: Upgrade" -H "Sec-WebSocket-Key: $(openssl rand -base64 16)" -H "Sec-WebSocket-Version: 13" URL</text>

  <!-- What curl can do -->
  <text x="40" y="300" fill="#79c0ff" font-size="14" font-weight="bold">Qué puede hacer curl con WebSockets</text>

  <rect x="40" y="315" width="345" height="40" rx="5" fill="#0d2f1a" stroke="#3fb950" stroke-width="1"/>
  <text x="212" y="333" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">curl SÍ puede</text>
  <text x="212" y="350" text-anchor="middle" fill="#8b949e" font-size="9">Verificar handshake (101 status) · curl 7.86+: --websocket</text>

  <rect x="410" y="315" width="350" height="40" rx="5" fill="#2d0a0a" stroke="#f85149" stroke-width="1"/>
  <text x="585" y="333" text-anchor="middle" fill="#f85149" font-size="10" font-weight="bold">curl NO es ideal para</text>
  <text x="585" y="350" text-anchor="middle" fill="#8b949e" font-size="9">Mensajería bidireccional interactiva. Usar websocat o wscat.</text>

  <rect x="40" y="365" width="720" height="12" rx="2"/>
  <text x="55" y="375" fill="#8b949e" font-size="9">curl es request/response por diseño. WebSocket requiere conexión persistente full-duplex → websocat / wscat para interactivo.</text>
</svg>
