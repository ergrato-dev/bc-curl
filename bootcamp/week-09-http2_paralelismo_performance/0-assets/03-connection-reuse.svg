<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="360" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Reutilización de Conexiones</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Cada conexión TCP + TLS cuesta ~150-250ms. Reutilizarlas mejora drásticamente la performance.</text>

  <!-- Cost breakdown -->
  <text x="40" y="82" fill="#79c0ff" font-size="14" font-weight="bold">Costo de una nueva conexión</text>

  <rect x="40" y="97" width="130" height="35" rx="4" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="105" y="118" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="bold">DNS ~50ms</text>
  <text x="185" y="118" fill="#8b949e" font-size="14">→</text>
  <rect x="200" y="97" width="130" height="35" rx="4" fill="#161b22" stroke="#79c0ff" stroke-width="1"/>
  <text x="265" y="118" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="bold">TCP ~50ms</text>
  <text x="345" y="118" fill="#8b949e" font-size="14">→</text>
  <rect x="360" y="97" width="130" height="35" rx="4" fill="#161b22" stroke="#d2a8ff" stroke-width="1"/>
  <text x="425" y="118" text-anchor="middle" fill="#d2a8ff" font-size="10" font-weight="bold">TLS ~100ms</text>
  <text x="505" y="118" fill="#8b949e" font-size="14">→</text>
  <rect x="520" y="97" width="140" height="35" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="590" y="118" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">Request HTTP</text>

  <!-- Persistent connections -->
  <text x="40" y="162" fill="#3fb950" font-size="14" font-weight="bold">Keep-Alive: conexiones persistentes (HTTP/1.1 default)</text>
  <rect x="40" y="177" width="720" height="30" rx="4" fill="#0d2f1a" stroke="#3fb950" stroke-width="1"/>
  <text x="55" y="197" fill="#8b949e" font-size="10">TCP se mantiene abierta entre requests. Sin keep-alive: nueva TCP por cada request. Con keep-alive: se reutiliza.</text>

  <!-- HTTP/2 multiplexing -->
  <text x="40" y="235" fill="#79c0ff" font-size="14" font-weight="bold">HTTP/2: multiplexación vs keep-alive</text>
  <rect x="40" y="250" width="350" height="60" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="1"/>
  <text x="215" y="273" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">Multiplexación HTTP/2</text>
  <text x="55" y="295" fill="#8b949e" font-size="10">Múltiples streams simultáneos en una TCP</text>
  <text x="55" y="312" fill="#8b949e" font-size="10">Requests en paralelo sin nuevas conexiones</text>

  <rect x="410" y="250" width="350" height="60" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="585" y="273" text-anchor="middle" fill="#f0883e" stroke-width="1">Keep-Alive HTTP/1.1</text>
  <text x="425" y="295" fill="#8b949e" font-size="10">Conexión persistente pero secuencial</text>
  <text x="425" y="312" fill="#8b949e" font-size="10">Un request a la vez por conexión</text>

  <!-- num_connects -->
  <rect x="40" y="328" width="720" height="24" rx="4" fill="#162340"/>
  <text x="60" y="344" fill="#79c0ff" font-size="10">Medir conexiones nuevas: curl -w "%{num_connects}\n" URL · Si > 0 indica que se abrió una nueva conexión TCP</text>
</svg>
