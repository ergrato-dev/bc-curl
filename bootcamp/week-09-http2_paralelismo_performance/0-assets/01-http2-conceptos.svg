<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 390" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="390" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">HTTP/2: Conceptos y diferencias con HTTP/1.1</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Multiplexación, compresión de headers, binario — una sola conexión TCP para todo</text>

  <!-- Comparison -->
  <rect x="25" y="75" width="240" height="195" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="145" y="103" text-anchor="middle" fill="#f0883e" font-size="16" font-weight="bold">HTTP/1.1</text>
  <text x="145" y="125" text-anchor="middle" fill="#8b949e" font-size="10">Texto plano</text>
  <text x="45" y="148" fill="#8b949e" font-size="10">1 request por conexión TCP</text>
  <text x="45" y="168" fill="#8b949e" font-size="10">Múltiples conexiones (6 por host)</text>
  <text x="45" y="188" fill="#8b949e" font-size="10">Headers repetidos — sin compresión</text>
  <text x="45" y="208" fill="#f85149" font-size="10">Head-of-line blocking (HOL)</text>
  <text x="45" y="228" fill="#8b949e" font-size="10">Protocolo: TCP</text>
  <text x="45" y="248" fill="#8b949e" font-size="10">curl: --http1.1</text>

  <rect x="280" y="75" width="240" height="195" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="400" y="103" text-anchor="middle" fill="#3fb950" font-size="16" font-weight="bold">HTTP/2</text>
  <text x="400" y="125" text-anchor="middle" fill="#8b949e" font-size="10">Binario (frames)</text>
  <text x="300" y="148" fill="#8b949e" font-size="10">Multiplexación: múltiples streams</text>
  <text x="300" y="168" fill="#8b949e" font-size="10">1 sola conexión TCP por host</text>
  <text x="300" y="188" fill="#8b949e" font-size="10">HPACK: compresión de headers</text>
  <text x="300" y="208" fill="#3fb950" font-size="10">Server Push (obsoleto)</text>
  <text x="300" y="228" fill="#8b949e" font-size="10">Protocolo: TCP + TLS</text>
  <text x="300" y="248" fill="#8b949e" font-size="10">curl: --http2 (default si soportado)</text>

  <rect x="535" y="75" width="240" height="195" rx="8" fill="#161b22" stroke="#79c0ff" stroke-width="2"/>
  <text x="655" y="103" text-anchor="middle" fill="#79c0ff" font-size="16" font-weight="bold">HTTP/3</text>
  <text x="655" y="125" text-anchor="middle" fill="#8b949e" font-size="10">Binario sobre QUIC</text>
  <text x="555" y="148" fill="#8b949e" font-size="10">Multiplexación sin HOL de TCP</text>
  <text x="555" y="168" fill="#8b949e" font-size="10">1 conexión QUIC (UDP)</text>
  <text x="555" y="188" fill="#8b949e" font-size="10">QPACK: compresión de headers</text>
  <text x="555" y="208" fill="#3fb950" font-size="10">Sin head-of-line blocking</text>
  <text x="555" y="228" fill="#8b949e" font-size="10">Protocolo: QUIC / UDP</text>
  <text x="555" y="248" fill="#8b949e" font-size="10">curl: --http3 (experimental)</text>

  <!-- ALPN -->
  <text x="40" y="300" fill="#79c0ff" font-size="14" font-weight="bold">Negociación: ALPN en TLS</text>
  <rect x="40" y="315" width="720" height="35" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="333" fill="#8b949e" font-size="10">Cliente ofrece h2 + http/1.1 durante TLS handshake → Servidor elige h2 si lo soporta → Conexión HTTP/2</text>
  <text x="60" y="348" fill="#8b949e" font-size="10">Ver con: curl -sv --http2 URL 2&gt;&amp;1 | grep ALPN</text>

  <rect x="40" y="360" width="720" height="24" rx="4" fill="#162340"/>
  <text x="60" y="376" fill="#79c0ff" font-size="10">Verificar soporte: curl --version | grep HTTP2  ·  Fallback automático a HTTP/1.1 si servidor no soporta HTTP/2</text>
</svg>
