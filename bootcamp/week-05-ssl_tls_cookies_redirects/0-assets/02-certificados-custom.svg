<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 390" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="390" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Certificados custom: tres escenarios</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Cuándo y cómo usar --cacert, --cert, --key</text>

  <!-- Scenario 1 -->
  <rect x="25" y="75" width="365" height="150" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="207" y="103" text-anchor="middle" fill="#f0883e" font-size="14" font-weight="bold">① Certificado auto-firmado</text>
  <text x="45" y="130" fill="#8b949e" font-size="10">Entorno: desarrollo local, staging interno</text>
  <text x="45" y="150" fill="#8b949e" font-size="10">Problema: cert no está firmado por CA conocida</text>
  <text x="45" y="170" fill="#8b949e" font-size="10">→ curl da error SSL</text>
  <rect x="45" y="185" width="325" height="28" rx="4" fill="#0d1117" stroke="#f0883e" stroke-width="1"/>
  <text x="60" y="204" fill="#f0883e" font-family="'Courier New', monospace" font-size="10">curl --cacert mi-ca.crt https://dev.local</text>

  <rect x="410" y="75" width="365" height="150" rx="8" fill="#161b22" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="592" y="103" text-anchor="middle" fill="#79c0ff" font-size="14" font-weight="bold">② CA privada corporativa</text>
  <text x="430" y="130" fill="#8b949e" font-size="10">Entorno: intranet, VPN, red corporativa</text>
  <text x="430" y="150" fill="#8b949e" font-size="10">Problema: CA propia no está en el bundle del sistema</text>
  <text x="430" y="170" fill="#8b949e" font-size="10">→ curl rechaza certificados internos</text>
  <rect x="430" y="185" width="325" height="28" rx="4" fill="#0d1117" stroke="#79c0ff" stroke-width="1"/>
  <text x="445" y="204" fill="#79c0ff" font-family="'Courier New', monospace" font-size="10">curl --cacert corporativa-ca.pem https://interno/</text>

  <!-- Scenario 3 -->
  <rect x="25" y="240" width="750" height="85" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="400" y="268" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="bold">③ mTLS (Mutual TLS): el servidor también verifica al cliente</text>
  <text x="45" y="295" fill="#8b949e" font-size="10">El cliente presenta su propio certificado para autenticarse. Usado en APIs de alta seguridad y microservicios.</text>
  <rect x="45" y="310" width="710" height="28" rx="4" fill="#0d2f1a" stroke="#3fb950" stroke-width="1"/>
  <text x="60" y="329" fill="#3fb950" font-family="'Courier New', monospace" font-size="10">curl --cert client.crt --key client.key --cacert server-ca.pem https://api.segura/</text>

  <!-- Summary -->
  <text x="40" y="358" fill="#79c0ff" font-size="13" font-weight="bold">Resumen</text>
  <rect x="40" y="368" width="228" height="18" rx="3" fill="#162340"/>
  <text x="154" y="381" text-anchor="middle" fill="#f0883e" font-size="10">--cacert: quién firmó al servidor</text>
  <rect x="282" y="368" width="228" height="18" rx="3" fill="#162340"/>
  <text x="396" y="381" text-anchor="middle" fill="#79c0ff" font-size="10">--cert + --key: quién es el cliente</text>
  <rect x="524" y="368" width="236" height="18" rx="3" fill="#162340"/>
  <text x="642" y="381" text-anchor="middle" fill="#f85149" font-size="10">-k: desactivar toda verificación</text>
</svg>
