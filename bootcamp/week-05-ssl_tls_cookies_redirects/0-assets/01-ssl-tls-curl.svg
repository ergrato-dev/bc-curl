<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="380" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">SSL/TLS con curl — Verificación de certificados</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">curl verifica el certificado del servidor automáticamente en cada conexión HTTPS</text>

  <!-- Verification flow -->
  <rect x="60" y="75" width="200" height="55" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="160" y="98" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">curl</text>
  <text x="160" y="118" text-anchor="middle" fill="#8b949e" font-size="10">cliente HTTPS</text>

  <text x="275" y="108" fill="#8b949e" font-size="16">→</text>

  <rect x="295" y="75" width="200" height="55" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="395" y="98" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="bold">Handshake TLS</text>
  <text x="395" y="118" text-anchor="middle" fill="#8b949e" font-size="10">negociación cifrado</text>

  <text x="510" y="108" fill="#8b949e" font-size="16">→</text>

  <rect x="530" y="60" width="210" height="85" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="635" y="85" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Verificación automática</text>
  <text x="545" y="107" fill="#8b949e" font-size="10">① Peer: cert firmado por CA</text>
  <text x="545" y="125" fill="#8b949e" font-size="10">② Host: nombre coincide con URL</text>

  <!-- Two checks -->
  <text x="40" y="170" fill="#79c0ff" font-size="14" font-weight="bold">Dos verificaciones</text>

  <rect x="40" y="185" width="350" height="65" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="215" y="208" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Peer Verification</text>
  <text x="55" y="228" fill="#8b949e" font-size="10">El certificado del servidor fue firmado por una CA de confianza</text>
  <text x="55" y="245" fill="#8b949e" font-size="10">curl usa el bundle de CAs del sistema operativo</text>

  <rect x="410" y="185" width="350" height="65" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="585" y="208" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Host Verification</text>
  <text x="425" y="228" fill="#8b949e" font-size="10">El nombre en el certificado (CN o SAN) coincide con el host de la URL</text>
  <text x="425" y="245" fill="#8b949e" font-size="10">Si no coincide, curl rechaza la conexión</text>

  <!-- --insecure -->
  <rect x="40" y="270" width="720" height="55" rx="6" fill="#2d0a0a" stroke="#f85149" stroke-width="1.5"/>
  <text x="400" y="293" text-anchor="middle" fill="#f85149" font-size="13" font-weight="bold">--insecure (-k): Desactiva la verificación</text>
  <text x="60" y="313" fill="#8b949e" font-size="10">curl acepta cualquier certificado sin verificarlo (auto-firmado, caducado, dominio incorrecto)</text>
  <text x="60" y="328" fill="#f85149" font-size="10">⚠  Solo para desarrollo local. Nunca en producción. Equivale a desactivar toda la seguridad TLS.</text>

  <!-- Inspect -->
  <rect x="40" y="340" width="720" height="30" rx="4" fill="#162340"/>
  <text x="60" y="360" fill="#79c0ff" font-family="'Courier New', monospace" font-size="11">curl -v https://sitio.com 2>&amp;1 | grep -E "SSL|subject|issuer|expire"    — inspeccionar handshake</text>
</svg>
