<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="400" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Cookies con curl</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Guardar sesión con -c y reenviar cookies con -b</text>

  <!-- Session flow -->
  <text x="40" y="82" fill="#79c0ff" font-size="14" font-weight="bold">Flujo de sesión con cookies</text>

  <!-- Step 1 -->
  <rect x="40" y="97" width="155" height="50" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="117" y="118" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">① Login</text>
  <text x="117" y="138" text-anchor="middle" fill="#8b949e" font-size="9">POST + credenciales</text>
  <text x="117" y="150" text-anchor="middle" fill="#8b949e" font-size="9">-c cookies.txt</text>

  <text x="205" y="125" fill="#8b949e" font-size="16">→</text>

  <!-- Step 2 -->
  <rect x="220" y="97" width="155" height="50" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="297" y="118" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">② Set-Cookie</text>
  <text x="297" y="138" text-anchor="middle" fill="#8b949e" font-size="9">Servidor envía</text>
  <text x="297" y="150" text-anchor="middle" fill="#8b949e" font-size="9">session=abc123</text>

  <text x="385" y="125" fill="#8b949e" font-size="16">→</text>

  <!-- Step 3 -->
  <rect x="400" y="97" width="155" height="50" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="477" y="118" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">③ Guardar</text>
  <text x="477" y="138" text-anchor="middle" fill="#8b949e" font-size="9">-c cookies.txt</text>
  <text x="477" y="150" text-anchor="middle" fill="#8b949e" font-size="9">archivo cookie jar</text>

  <text x="565" y="125" fill="#8b949e" font-size="16">→</text>

  <!-- Step 4 -->
  <rect x="580" y="97" width="180" height="50" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="670" y="118" text-anchor="middle" fill="#d2a8ff" font-size="11" font-weight="bold">④ Request autenticado</text>
  <text x="670" y="138" text-anchor="middle" fill="#8b949e" font-size="9">-b cookies.txt</text>
  <text x="670" y="150" text-anchor="middle" fill="#8b949e" font-size="9">envía Cookie: session=abc</text>

  <!-- Flags explained -->
  <text x="40" y="180" fill="#79c0ff" font-size="14" font-weight="bold">Flags esenciales</text>

  <rect x="40" y="195" width="350" height="70" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="215" y="218" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">-c cookies.txt (guardar)</text>
  <text x="55" y="240" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">curl -c cookies.txt https://httpbin.org/cookies/set?token=abc</text>
  <text x="55" y="258" fill="#8b949e" font-size="9">Formato Netscape cookie jar: dominio, path, secure, expiry, name, value</text>

  <rect x="410" y="195" width="350" height="70" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="585" y="218" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="bold">-b cookies.txt (enviar)</text>
  <text x="425" y="240" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">curl -b cookies.txt https://httpbin.org/cookies</text>
  <text x="425" y="258" fill="#8b949e" font-size="9">También se puede: -b "nombre=valor" (cookie manual)</text>

  <!-- One-liner -->
  <text x="40" y="295" fill="#79c0ff" font-size="14" font-weight="bold">Flujo completo en un solo paso</text>
  <rect x="40" y="310" width="720" height="28" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1"/>
  <text x="60" y="329" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">curl -c cookies.txt -b cookies.txt https://httpbin.org/cookies/set?token=abc && curl -b cookies.txt https://httpbin.org/cookies</text>

  <!-- Format -->
  <rect x="40" y="355" width="720" height="35" rx="4" fill="#162340"/>
  <text x="60" y="372" fill="#79c0ff" font-size="10" font-weight="bold">Formato cookie jar: </text>
  <text x="210" y="372" fill="#8b949e" font-size="10">httpbin.org \t FALSE \t / \t FALSE \t 1735000000 \t token \t abc</text>
  <text x="60" y="387" fill="#8b949e" font-size="9">dominio · subdominios · path · secure · expiry (Unix timestamp) · nombre · valor</text>
</svg>
