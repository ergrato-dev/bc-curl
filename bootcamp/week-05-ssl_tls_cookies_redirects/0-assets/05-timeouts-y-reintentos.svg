<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 390" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="390" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Timeouts y reintentos</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Configuración robusta para peticiones en producción</text>

  <!-- Timeout types -->
  <text x="40" y="82" fill="#79c0ff" font-size="14" font-weight="bold">Dos tipos de timeout</text>

  <rect x="40" y="97" width="350" height="95" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="215" y="120" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">--connect-timeout S</text>
  <text x="55" y="145" fill="#8b949e" font-size="10">Tiempo máximo para establecer conexión TCP + TLS</text>
  <text x="55" y="163" fill="#8b949e" font-size="10">No incluye transferencia de datos</text>
  <text x="55" y="183" fill="#8b949e" font-size="10">Recomendado: 3-10 segundos</text>

  <rect x="410" y="97" width="350" height="95" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="585" y="120" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="bold">--max-time S</text>
  <text x="425" y="145" fill="#8b949e" font-size="10">Tiempo máximo total para toda la operación</text>
  <text x="425" y="163" fill="#8b949e" font-size="10">Incluye conexión + transferencia completa</text>
  <text x="425" y="183" fill="#8b949e" font-size="10">Regla: según tipo de operación (5s GET, 30s upload)</text>

  <!-- Timeline -->
  <text x="40" y="222" fill="#79c0ff" font-size="14" font-weight="bold">Línea de tiempo de un request</text>

  <rect x="40" y="237" width="720" height="45" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <line x1="60" y1="260" x2="740" y2="260" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="60" cy="260" r="3" fill="#f0883e"/>
  <text x="60" y="278" text-anchor="middle" fill="#f0883e" font-size="9">Inicio</text>
  <line x1="520" y1="252" x2="520" y2="268" stroke="#79c0ff" stroke-width="1"/>
  <text x="520" y="278" text-anchor="middle" fill="#79c0ff" font-size="9">Connect</text>
  <line x1="660" y1="252" x2="660" y2="268" stroke="#d2a8ff" stroke-width="1"/>
  <text x="660" y="278" text-anchor="middle" fill="#d2a8ff" font-size="9">Max-time</text>
  <text x="380" y="252" fill="#f0883e" font-size="9">← connect-timeout →</text>
  <text x="590" y="252" fill="#d2a8ff" font-size="9">← max-time →</text>

  <!-- Retries -->
  <text x="40" y="300" fill="#79c0ff" font-size="14" font-weight="bold">Reintentos</text>

  <rect x="40" y="315" width="228" height="35" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="154" y="332" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">--retry N</text>
  <text x="154" y="347" text-anchor="middle" fill="#8b949e" font-size="9">reintentos (default: en error red)</text>

  <rect x="282" y="315" width="228" height="35" rx="5" fill="#161b22" stroke="#79c0ff" stroke-width="1"/>
  <text x="396" y="332" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="bold">--retry-delay S</text>
  <text x="396" y="347" text-anchor="middle" fill="#8b949e" font-size="9">espera entre intentos</text>

  <rect x="524" y="315" width="236" height="35" rx="5" fill="#161b22" stroke="#d2a8ff" stroke-width="1"/>
  <text x="642" y="332" text-anchor="middle" fill="#d2a8ff" font-size="10" font-weight="bold">--retry-all-errors</text>
  <text x="642" y="347" text-anchor="middle" fill="#8b949e" font-size="9">también 5xx (curl 7.71+)</text>

  <!-- Exit codes -->
  <rect x="40" y="365" width="720" height="20" rx="3" fill="#162340"/>
  <text x="60" y="379" fill="#79c0ff" font-size="10">exit code 28 = timeout · 6 = DNS · 7 = conexión rechazada · 35 = error SSL · 56 = fallo de red</text>
</svg>
