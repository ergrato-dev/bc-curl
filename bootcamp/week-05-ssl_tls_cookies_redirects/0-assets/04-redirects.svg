<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="380" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Redirects HTTP</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">curl no sigue redirects por defecto. Activarlos con -L, limitarlos con --max-redirs</text>

  <!-- Without -L -->
  <text x="40" y="82" fill="#f85149" font-size="14" font-weight="bold">Sin -L (comportamiento por defecto)</text>
  <rect x="40" y="97" width="180" height="40" rx="5" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="130" y="115" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">curl URL</text>
  <text x="130" y="132" text-anchor="middle" fill="#8b949e" font-size="9">→ GET /redirect/1</text>
  <text x="235" y="120" fill="#8b949e" font-size="16">→</text>
  <rect x="250" y="97" width="150" height="40" rx="5" fill="#2a1a0d" stroke="#f0883e" stroke-width="1.5"/>
  <text x="325" y="115" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">302 Found</text>
  <text x="325" y="132" text-anchor="middle" fill="#8b949e" font-size="9">Location: /get</text>
  <text x="415" y="120" fill="#f85149" font-size="16">→</text>
  <rect x="430" y="97" width="200" height="40" rx="5" fill="#2d0a0a" stroke="#f85149" stroke-width="1"/>
  <text x="530" y="115" text-anchor="middle" fill="#f85149" font-size="11" font-weight="bold">curl se detiene aquí</text>
  <text x="530" y="132" text-anchor="middle" fill="#8b949e" font-size="9">no sigue el redirect</text>

  <!-- With -L -->
  <text x="40" y="165" fill="#3fb950" font-size="14" font-weight="bold">Con -L (sigue redirects)</text>
  <rect x="40" y="180" width="180" height="40" rx="5" fill="#0d2f1a" stroke="#3fb950" stroke-width="1"/>
  <text x="130" y="198" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">curl -L URL</text>
  <text x="130" y="215" text-anchor="middle" fill="#8b949e" font-size="9">→ /redirect/3</text>
  <text x="235" y="203" fill="#8b949e" font-size="16">→</text>
  <rect x="250" y="180" width="100" height="40" rx="5" fill="#0d2f1a" stroke="#79c0ff" stroke-width="1"/>
  <text x="300" y="200" text-anchor="middle" fill="#79c0ff" font-size="10">302 → /2</text>
  <text x="365" y="203" fill="#8b949e" font-size="14">→</text>
  <rect x="375" y="180" width="100" height="40" rx="5" fill="#0d2f1a" stroke="#79c0ff" stroke-width="1"/>
  <text x="425" y="200" text-anchor="middle" fill="#79c0ff" font-size="10">302 → /1</text>
  <text x="490" y="203" fill="#8b949e" font-size="14">→</text>
  <rect x="500" y="180" width="120" height="40" rx="5" fill="#0d2f1a" stroke="#3fb950" stroke-width="1.5"/>
  <text x="560" y="200" text-anchor="middle" fill="#3fb950" font-size="10">200 OK</text>

  <!-- Status codes -->
  <text x="40" y="255" fill="#79c0ff" font-size="14" font-weight="bold">Status codes de redirect</text>

  <rect x="40" y="270" width="168" height="40" rx="5" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="124" y="288" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">301 Permanente</text>
  <text x="124" y="305" text-anchor="middle" fill="#8b949e" font-size="9">puede cambiar POST → GET</text>

  <rect x="220" y="270" width="168" height="40" rx="5" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="304" y="288" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">302 Temporal</text>
  <text x="304" y="305" text-anchor="middle" fill="#8b949e" font-size="9">puede cambiar POST → GET</text>

  <rect x="400" y="270" width="168" height="40" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="484" y="288" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">307 Temporal</text>
  <text x="484" y="305" text-anchor="middle" fill="#8b949e" font-size="9">mantiene el método</text>

  <rect x="580" y="270" width="180" height="40" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="670" y="288" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">308 Permanente</text>
  <text x="670" y="305" text-anchor="middle" fill="#8b949e" font-size="9">mantiene el método</text>

  <!-- Tools -->
  <rect x="40" y="328" width="350" height="42" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="215" y="348" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="bold">Limitar redirects</text>
  <text x="55" y="365" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">curl -L --max-redirs 5 URL   (default: 30 redirects máximo)</text>

  <rect x="410" y="328" width="350" height="42" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="585" y="348" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="bold">Inspeccionar cadena</text>
  <text x="425" y="365" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">curl -L -v URL 2>&amp;1 | grep -E "^&lt; HTTP|^&lt; Location"</text>
</svg>
