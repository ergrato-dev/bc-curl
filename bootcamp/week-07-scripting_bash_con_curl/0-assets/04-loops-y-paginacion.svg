<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 370" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="370" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Loops, Iteración y Paginación con curl</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Procesar listas de recursos, paginar APIs y respetar rate limits</text>

  <!-- Loop patterns -->
  <text x="40" y="82" fill="#79c0ff" font-size="14" font-weight="bold">Patrones de loop</text>

  <rect x="40" y="97" width="350" height="70" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="215" y="118" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">for sobre lista de IDs</text>
  <text x="55" y="140" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">IDS=(1 5 10 42 100)</text>
  <text x="55" y="158" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">for id in "${IDS[@]}"; do curl ... ; done</text>

  <rect x="410" y="97" width="350" height="70" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="585" y="118" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">while read desde archivo</text>
  <text x="425" y="140" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">while IFS= read -r line; do</text>
  <text x="425" y="158" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">  curl ... ; done < ids.txt</text>

  <!-- Pagination -->
  <text x="40" y="195" fill="#79c0ff" font-size="14" font-weight="bold">Paginación: loop while hasta agotar páginas</text>
  <rect x="40" y="210" width="720" height="50" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="1"/>
  <text x="60" y="232" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">while true; do</text>
  <text x="60" y="250" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">  RESPUESTA=$(curl -s "URL?_page=$PAGE&amp;_limit=10")</text>
  <text x="60" y="268" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">  COUNT=$(echo "$RESPUESTA" | jq 'length')  →  [ "$COUNT" -eq 0 ] && break;  PAGE=$((PAGE+1)); done</text>

  <!-- Rate limiting -->
  <text x="40" y="285" fill="#79c0ff" font-size="14" font-weight="bold">Rate limiting y sleep</text>

  <rect x="40" y="298" width="350" height="45" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="215" y="318" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">Delay entre requests</text>
  <text x="215" y="338" text-anchor="middle" fill="#8b949e" font-size="9">sleep 0.5  (100 req/min = 0.6s mínimo)</text>

  <rect x="410" y="298" width="350" height="45" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="585" y="318" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">Manejar 429 Rate Limit</text>
  <text x="585" y="338" text-anchor="middle" fill="#8b949e" font-size="9">leer header Retry-After → sleep</text>

  <!-- Footer -->
  <rect x="40" y="358" width="720" height="10" rx="2" fill="#162340"/>
  <text x="60" y="367" fill="#79c0ff" font-size="9">Secuencial con sleep = lo más seguro. Paralelo (xargs -P, &amp;) tiene complejidad adicional.</text>
</svg>
