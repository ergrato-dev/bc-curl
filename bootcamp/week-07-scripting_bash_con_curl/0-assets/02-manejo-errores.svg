<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="380" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Manejo de Errores en Scripts con curl</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Patrones para scripts robustos: capturar, clasificar y reaccionar</text>

  <!-- Layers -->
  <text x="40" y="82" fill="#79c0ff" font-size="14" font-weight="bold">Dos capas de error</text>

  <rect x="40" y="97" width="345" height="85" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="212" y="120" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">Capa 1: Error de red/curl</text>
  <text x="55" y="143" fill="#8b949e" font-size="10">Exit code ≠ 0: DNS, conexión, timeout, TLS</text>
  <text x="55" y="163" fill="#8b949e" font-size="10">→ Ni siquiera hubo respuesta HTTP</text>
  <text x="55" y="183" fill="#8b949e" font-family="'Courier New', monospace" font-size="9">CURL_EXIT=$? → case 6|7|28|35 ...</text>

  <rect x="410" y="97" width="350" height="85" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="585" y="120" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="bold">Capa 2: Error HTTP</text>
  <text x="425" y="143" fill="#8b949e" font-size="10">Exit code 0, pero HTTP 4xx/5xx</text>
  <text x="425" y="163" fill="#8b949e" font-size="10">→ La transferencia fue exitosa, pero el servidor reporta error</text>
  <text x="425" y="183" fill="#8b949e" font-family="'Courier New', monospace" font-size="9">HTTP_CODE con -w → if [ $HTTP_CODE -ge 400 ]</text>

  <!-- Patterns -->
  <text x="40" y="212" fill="#79c0ff" font-size="14" font-weight="bold">Patrones de manejo</text>

  <rect x="40" y="227" width="350" height="50" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="215" y="248" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">Función curl_check() reutilizable</text>
  <text x="55" y="268" fill="#8b949e" font-size="9">Encapsula lógica. Retorna OK/ERROR por tipo. Usa archivo temporal para body.</text>

  <rect x="410" y="227" width="350" height="50" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="1"/>
  <text x="585" y="248" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">set -o pipefail</text>
  <text x="425" y="268" fill="#8b949e" font-size="9">curl -s URL | jq → si curl falla, el pipeline falla (no solo jq).</text>

  <!-- Logging -->
  <rect x="40" y="292" width="350" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="215" y="310" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="bold">Logging estructurado</text>
  <text x="215" y="328" text-anchor="middle" fill="#8b949e" font-family="'Courier New', monospace" font-size="9">log() { echo "[$(date...)] $*" >&2; }</text>

  <rect x="410" y="292" width="350" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="585" y="310" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="bold">Clasificar tipo de error</text>
  <text x="585" y="328" text-anchor="middle" fill="#8b949e" font-size="9">ERROR_RED | ERROR_TIMEOUT | ERROR_RATE_LIMIT | HTTP_ERROR</text>

  <!-- Boneless advice -->
  <rect x="40" y="348" width="720" height="28" rx="4" fill="#162340"/>
  <text x="60" y="367" fill="#79c0ff" font-size="10">Recomendación: NO usar set -e en scripts con manejo granular. Usar if/|| explícitos.</text>
</svg>
