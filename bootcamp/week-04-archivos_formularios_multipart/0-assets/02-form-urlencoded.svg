<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 410" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="410" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Formularios URL-encoded</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Formato clásico de formularios HTML: clave=valor&amp;clave=valor</text>

  <!-- The format -->
  <rect x="40" y="75" width="720" height="55" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="420" y="98" text-anchor="middle" fill="#f0883e" font-size="14" font-weight="bold">application/x-www-form-urlencoded</text>
  <text x="60" y="120" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">nombre=Ana&amp;apellido=Lopez&amp;edad=30&amp;activo=true</text>

  <!-- -d vs --data-urlencode -->
  <text x="40" y="160" fill="#79c0ff" font-size="14" font-weight="bold">Dos formas de enviar</text>

  <rect x="40" y="175" width="350" height="90" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="215" y="198" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">-d (datos literales)</text>
  <text x="55" y="220" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">curl -d "nombre=Ana&amp;edad=30" URL</text>
  <text x="55" y="240" fill="#8b949e" font-size="9">No codifica caracteres especiales</text>
  <text x="55" y="255" fill="#f85149" font-size="9">Problema: "Hola &amp; bienvenidos" → &amp; rompe la shell</text>

  <rect x="410" y="175" width="350" height="90" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="585" y="198" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">--data-urlencode (seguro)</text>
  <text x="425" y="220" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">curl --data-urlencode "nombre=Ana" \</text>
  <text x="425" y="237" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">     --data-urlencode "msg=Hola &amp; bienvenidos" URL</text>
  <text x="425" y="255" fill="#3fb950" font-size="9">Codifica automáticamente (percent-encoding)</text>

  <!-- Encoding examples -->
  <text x="40" y="295" fill="#79c0ff" font-size="14" font-weight="bold">Percent-encoding automático</text>

  <rect x="40" y="310" width="720" height="45" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="328" fill="#8b949e" font-size="10">Carácter</text>
  <text x="200" y="328" fill="#8b949e" font-size="10">Entrada</text>
  <text x="400" y="328" fill="#8b949e" font-size="10">Codificado como</text>
  <text x="60" y="348" fill="#8b949e" font-size="10">espacio</text><text x="200" y="348" fill="#f0f6fc" font-family="'Courier New', monospace" font-size="10">Ana Lopez</text><text x="400" y="348" fill="#f0f6fc" font-family="'Courier New', monospace" font-size="10">Ana%20Lopez</text>
  <text x="550" y="348" fill="#8b949e" font-size="10">&amp;</text><text x="620" y="348" fill="#f0f6fc" font-family="'Courier New', monospace" font-size="10">A &amp; B</text><text x="710" y="348" fill="#f0f6fc" font-family="'Courier New', monospace" font-size="10">A%20%26%20B</text>

  <!-- From file -->
  <rect x="40" y="370" width="720" height="30" rx="4" fill="#162340"/>
  <text x="60" y="390" fill="#79c0ff" font-size="10">Leer valor desde archivo: curl --data-urlencode "bio@descripcion.txt" URL</text>
</svg>
