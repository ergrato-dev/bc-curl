<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="380" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Descargar archivos con curl</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Flags para descargar, reanudar, limitar velocidad y controlar progreso</text>

  <!-- -o vs -O -->
  <text x="40" y="82" fill="#79c0ff" font-size="14" font-weight="bold">Guardar en disco</text>

  <rect x="40" y="97" width="350" height="55" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="215" y="118" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">-o: nombre explícito</text>
  <text x="55" y="142" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">curl -o imagen.png https://httpbin.org/image/png</text>

  <rect x="410" y="97" width="350" height="55" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="585" y="118" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="bold">-O: nombre del servidor</text>
  <text x="425" y="142" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">curl -O https://httpbin.org/image/png</text>

  <!-- Progress -->
  <text x="40" y="180" fill="#79c0ff" font-size="14" font-weight="bold">Barra de progreso</text>

  <rect x="40" y="195" width="350" height="40" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="215" y="213" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">--progress-bar (-#)</text>
  <text x="215" y="230" text-anchor="middle" fill="#8b949e" font-size="10">Barra compacta: [=====>   ] 75%</text>

  <rect x="410" y="195" width="350" height="40" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1"/>
  <text x="585" y="213" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="bold">-s (silent)</text>
  <text x="585" y="230" text-anchor="middle" fill="#8b949e" font-size="10">Sin barra de progreso ni errores</text>

  <!-- Resume -->
  <text x="40" y="260" fill="#79c0ff" font-size="14" font-weight="bold">Reanudar descarga interrumpida</text>

  <rect x="40" y="275" width="720" height="48" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="60" y="296" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">curl -o archivo.zip URL     # descarga parcial (Ctrl+C para interrumpir)</text>
  <text x="60" y="314" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">curl -C - -o archivo.zip URL  # reanuda desde donde quedó (envía header Range: bytes=N-)</text>

  <!-- Advanced -->
  <text x="40" y="348" fill="#79c0ff" font-size="14" font-weight="bold">Avanzado</text>

  <rect x="40" y="358" width="350" height="16" rx="3"/>
  <text x="45" y="370" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">curl --limit-rate 500k -o archivo.zip URL    (limitar velocidad)</text>

  <rect x="410" y="358" width="350" height="16" rx="3"/>
  <text x="415" y="370" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">curl -o archivo1 URL1 -o archivo2 URL2        (múltiples descargas)</text>
</svg>
