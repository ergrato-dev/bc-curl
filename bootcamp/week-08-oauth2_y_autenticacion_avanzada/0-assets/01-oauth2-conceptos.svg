<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 410" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="410" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">OAuth 2.0 — Conceptos fundamentales</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Protocolo de autorización estándar: 4 roles, 4 flows, 3 tipos de token</text>

  <!-- 4 Roles -->
  <text x="40" y="85" fill="#79c0ff" font-size="14" font-weight="bold">Los 4 roles</text>

  <rect x="40" y="100" width="168" height="55" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="124" y="120" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">Resource Owner</text>
  <text x="124" y="140" text-anchor="middle" fill="#8b949e" font-size="9">Usuario (dueño de datos)</text>

  <rect x="220" y="100" width="168" height="55" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="304" y="120" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">Client</text>
  <text x="304" y="140" text-anchor="middle" fill="#8b949e" font-size="9">App que pide acceso</text>

  <rect x="400" y="100" width="168" height="55" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="484" y="120" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">Auth Server</text>
  <text x="484" y="140" text-anchor="middle" fill="#8b949e" font-size="9">Emite tokens</text>

  <rect x="580" y="100" width="180" height="55" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="670" y="120" text-anchor="middle" fill="#d2a8ff" font-size="11" font-weight="bold">Resource Server</text>
  <text x="670" y="140" text-anchor="middle" fill="#8b949e" font-size="9">Protege los datos (API)</text>

  <!-- 4 Flows -->
  <text x="40" y="190" fill="#79c0ff" font-size="14" font-weight="bold">Los 4 flows (grant types)</text>

  <rect x="40" y="205" width="168" height="55" rx="6" fill="#0d2f1a" stroke="#3fb950" stroke-width="1.5"/>
  <text x="124" y="225" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">Client Credentials</text>
  <text x="124" y="245" text-anchor="middle" fill="#8b949e" font-size="9">server-to-server</text>
  <text x="124" y="258" text-anchor="middle" fill="#8b949e" font-size="9">sin usuario</text>

  <rect x="220" y="205" width="168" height="55" rx="6" fill="#162340" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="304" y="225" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">Authorization Code</text>
  <text x="304" y="245" text-anchor="middle" fill="#8b949e" font-size="9">user-delegated</text>
  <text x="304" y="258" text-anchor="middle" fill="#8b949e" font-size="9">+ PKCE (público)</text>

  <rect x="400" y="205" width="168" height="55" rx="6" fill="#161b22" stroke="#8b949e" stroke-width="1"/>
  <text x="484" y="225" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="bold">Device Code</text>
  <text x="484" y="245" text-anchor="middle" fill="#8b949e" font-size="9">dispositivos sin browser</text>
  <text x="484" y="258" text-anchor="middle" fill="#8b949e" font-size="9">TV, IoT</text>

  <rect x="580" y="205" width="180" height="55" rx="6" fill="#161b22" stroke="#f85149" stroke-width="1"/>
  <text x="670" y="225" text-anchor="middle" fill="#f85149" font-size="11" font-weight="bold">Implicit ✗</text>
  <text x="670" y="245" text-anchor="middle" fill="#8b949e" font-size="9">obsoleto</text>
  <text x="670" y="258" text-anchor="middle" fill="#f85149" font-size="9">no usar</text>

  <!-- Decision tree -->
  <text x="40" y="295" fill="#79c0ff" font-size="14" font-weight="bold">¿Qué flow usar?</text>

  <rect x="40" y="310" width="340" height="55" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="210" y="333" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">Client Credentials</text>
  <text x="55" y="356" fill="#8b949e" font-size="10">✓ Comunicación entre servidores · ✓ Sin usuario humano · ✓ CI/CD, cron jobs</text>

  <rect x="400" y="310" width="360" height="55" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="1"/>
  <text x="580" y="333" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">Authorization Code + PKCE</text>
  <text x="415" y="356" fill="#8b949e" font-size="10">✓ App con usuarios humanos · ✓ Browser/single-page app · ✓ Delegación de acceso</text>

  <!-- Token types -->
  <rect x="40" y="380" width="720" height="24" rx="4" fill="#162340"/>
  <text x="60" y="396" fill="#79c0ff" font-size="10">Access Token (vida corta, autoriza requests) · Refresh Token (vida larga, obtiene nuevos access tokens) · ID Token (OIDC, info del usuario)</text>
</svg>
