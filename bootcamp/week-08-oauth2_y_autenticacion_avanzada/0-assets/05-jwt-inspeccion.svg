<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 390" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="390" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Inspección de JWT</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Decodificar las 3 partes del token sin herramientas externas</text>

  <!-- JWT Structure -->
  <text x="40" y="80" fill="#79c0ff" font-size="14" font-weight="bold">Estructura de 3 partes (separadas por .)</text>

  <rect x="40" y="95" width="720" height="40" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="55" y="115" font-family="'Courier New', monospace" font-size="10">
    <tspan fill="#f0883e">eyJhbGciOiJSUzI1NiJ9</tspan><tspan fill="#8b949e">.</tspan><tspan fill="#3fb950">eyJzdWIiOiIxMjMifQ</tspan><tspan fill="#8b949e">.</tspan><tspan fill="#79c0ff">SflKxwRJSMeKK...</tspan>
  </text>
  <text x="55" y="132" fill="#8b949e" font-size="9">Parte 1: <tspan fill="#f0883e">Header</tspan> (algoritmo) · Parte 2: <tspan fill="#3fb950">Payload</tspan> (claims, datos del usuario) · Parte 3: <tspan fill="#79c0ff">Signature</tspan> (firma criptográfica)</text>

  <!-- Decode -->
  <text x="40" y="162" fill="#79c0ff" font-size="14" font-weight="bold">Decodificar en bash</text>
  <rect x="40" y="177" width="720" height="55" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="55" y="198" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">PAYLOAD=$(echo "$TOKEN" | cut -d'.' -f2)</text>
  <text x="55" y="216" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">echo "${PAYLOAD}==" | base64 -d 2>/dev/null | python3 -m json.tool</text>
  <text x="55" y="234" fill="#8b949e" font-size="9">Nota: base64url usa - en vez de + y _ en vez de / por lo que requiere reemplazo previo en algunos casos</text>

  <!-- Standard claims -->
  <text x="40" y="262" fill="#79c0ff" font-size="14" font-weight="bold">Claims estándar (RFC 7519)</text>

  <rect x="40" y="277" width="228" height="35" rx="5" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="154" y="294" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="bold">sub</text>
  <text x="154" y="310" text-anchor="middle" fill="#8b949e" font-size="9">Subject (ID del usuario)</text>

  <rect x="282" y="277" width="228" height="35" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="396" y="294" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">iss</text>
  <text x="396" y="310" text-anchor="middle" fill="#8b949e" font-size="9">Issuer (quién emitió)</text>

  <rect x="524" y="277" width="236" height="35" rx="5" fill="#161b22" stroke="#79c0ff" stroke-width="1"/>
  <text x="642" y="294" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="bold">exp</text>
  <text x="642" y="310" text-anchor="middle" fill="#8b949e" font-size="9">Expiration (Unix timestamp)</text>

  <rect x="40" y="322" width="228" height="35" rx="5" fill="#161b22" stroke="#d2a8ff" stroke-width="1"/>
  <text x="154" y="339" text-anchor="middle" fill="#d2a8ff" font-size="10" font-weight="bold">iat</text>
  <text x="154" y="355" text-anchor="middle" fill="#8b949e" font-size="9">Issued At (cuándo se emitió)</text>

  <rect x="282" y="322" width="228" height="35" rx="5" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="396" y="339" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="bold">aud</text>
  <text x="396" y="355" text-anchor="middle" fill="#8b949e" font-size="9">Audience (para quién)</text>

  <rect x="524" y="322" width="236" height="35" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="642" y="339" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">nbf</text>
  <text x="642" y="355" text-anchor="middle" fill="#8b949e" font-size="9">Not Before (válido desde)</text>

  <!-- Security -->
  <rect x="40" y="368" width="720" height="18" rx="3" fill="#2d0a0a" stroke="#f85149" stroke-width="1"/>
  <text x="60" y="381" fill="#f85149" font-size="9">IMPORTANTE: El payload es legible por cualquiera (solo está codificado en base64). NUNCA poner secretos en el payload.</text>
</svg>
