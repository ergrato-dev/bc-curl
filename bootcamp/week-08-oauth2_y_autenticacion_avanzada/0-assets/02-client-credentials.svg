<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="380" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Client Credentials Flow</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Flujo más simple de OAuth2: machine-to-machine, sin usuario humano</text>

  <!-- Flow diagram -->
  <text x="40" y="82" fill="#79c0ff" font-size="14" font-weight="bold">Flujo completo en 3 pasos</text>

  <rect x="60" y="97" width="180" height="50" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="150" y="118" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">Client (script/curl)</text>
  <text x="150" y="138" text-anchor="middle" fill="#8b949e" font-size="9">client_id + client_secret</text>

  <text x="255" y="125" fill="#8b949e" font-size="16">→</text>

  <!-- Step 1 -->
  <rect x="275" y="90" width="240" height="65" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="395" y="113" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">① POST /token</text>
  <text x="290" y="133" fill="#8b949e" font-family="'Courier New', monospace" font-size="9">grant_type=client_credentials</text>
  <text x="290" y="148" fill="#8b949e" font-family="'Courier New', monospace" font-size="9">client_id=xxx&amp;client_secret=yyy</text>

  <text x="530" y="118" fill="#8b949e" font-size="16">→</text>

  <!-- Step 2 -->
  <rect x="545" y="90" width="215" height="65" rx="6" fill="#0d2f1a" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="652" y="113" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="bold">② Auth Server</text>
  <text x="652" y="133" text-anchor="middle" fill="#8b949e" font-size="9">Verifica credenciales</text>
  <text x="652" y="148" text-anchor="middle" fill="#8b949e" font-size="9">Devuelve access_token</text>

  <!-- curl command -->
  <text x="40" y="185" fill="#79c0ff" font-size="14" font-weight="bold">Obtener token con curl</text>
  <rect x="40" y="200" width="720" height="45" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="220" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">curl -s -X POST "https://auth.server/token" \</text>
  <text x="60" y="240" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">  -d "grant_type=client_credentials" -d "client_id=CLIENT" -d "client_secret=SECRET" | jq -r '.access_token'</text>

  <!-- Response example -->
  <text x="40" y="270" fill="#79c0ff" font-size="14" font-weight="bold">Respuesta JSON del servidor</text>
  <rect x="40" y="285" width="720" height="60" rx="6" fill="#0d1117" stroke="#3fb950" stroke-width="1"/>
  <text x="60" y="305" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">{</text>
  <text x="60" y="323" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">  "access_token": "eyJhbGciOiJSUzI1NiIs...",</text>
  <text x="60" y="341" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">  <tspan fill="#3fb950">"expires_in": 3600,</tspan>   "token_type": "Bearer"  }</text>

  <!-- Token usage -->
  <rect x="40" y="355" width="720" height="20" rx="3" fill="#162340"/>
  <text x="60" y="369" fill="#79c0ff" font-family="'Courier New', monospace" font-size="10">curl -H "Authorization: Bearer $TOKEN" https://api.server/datos    ← usar el token</text>
</svg>
