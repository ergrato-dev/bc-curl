<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="380" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Authorization Code Flow</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Delegación de acceso: el usuario autoriza, el client obtiene un token</text>

  <text x="40" y="82" fill="#79c0ff" font-size="14" font-weight="bold">Flujo en 4 pasos (con PKCE)</text>

  <rect x="40" y="97" width="345" height="55" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="212" y="118" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">1. Generar code verifier + challenge</text>
  <text x="55" y="140" fill="#8b949e" font-size="10">Cliente genera string aleatorio y su hash SHA256</text>

  <rect x="410" y="97" width="350" height="55" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="585" y="118" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">2. Usuario autoriza (browser)</text>
  <text x="425" y="140" fill="#8b949e" font-size="10">Redirect a auth server con client_id, challenge, scope</text>

  <rect x="40" y="167" width="345" height="55" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="212" y="188" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">3. Intercambiar code por token</text>
  <text x="55" y="209" fill="#8b949e" font-size="10">POST /token con code + code_verifier</text>
  <text x="55" y="224" fill="#3fb950" font-size="10">→ access_token + refresh_token</text>

  <rect x="410" y="167" width="350" height="55" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="585" y="188" text-anchor="middle" fill="#d2a8ff" font-size="11" font-weight="bold">4. Usar access token</text>
  <text x="425" y="209" fill="#8b949e" font-size="10">Authorization: Bearer TOKEN → API protegida</text>
  <text x="425" y="224" fill="#8b949e" font-size="10">curl puede automatizar pasos 1, 3 y 4</text>

  <!-- What curl can/cannot do -->
  <text x="40" y="252" fill="#79c0ff" font-size="14" font-weight="bold">Qué puede y no puede curl en este flow</text>

  <rect x="40" y="267" width="345" height="40" rx="5" fill="#0d2f1a" stroke="#3fb950" stroke-width="1"/>
  <text x="212" y="285" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">curl SÍ puede</text>
  <text x="212" y="302" text-anchor="middle" fill="#8b949e" font-size="9">Generar PKCE + Intercambiar code + Usar token</text>

  <rect x="410" y="267" width="350" height="40" rx="5" fill="#2d0a0a" stroke="#f85149" stroke-width="1"/>
  <text x="585" y="285" text-anchor="middle" fill="#f85149" font-size="10" font-weight="bold">curl NO puede</text>
  <text x="585" y="302" text-anchor="middle" fill="#8b949e" font-size="9">Mostrar consent screen (paso 2 requiere browser)</text>

  <!-- curl commands -->
  <text x="40" y="335" fill="#79c0ff" font-size="14" font-weight="bold">Intercambio del code (paso 3 con curl)</text>
  <rect x="40" y="348" width="720" height="26" rx="4" fill="#1f2937"/>
  <text x="55" y="365" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">curl -s -X POST TOKEN_URL -d grant_type=authorization_code -d code=CODE -d code_verifier=VERIFIER -d redirect_uri=URI -d client_id=ID | jq .</text>
</svg>
