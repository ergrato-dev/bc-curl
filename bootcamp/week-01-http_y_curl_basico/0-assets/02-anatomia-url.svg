<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="Arial, Helvetica, sans-serif">
  <rect width="900" height="360" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Anatomía de una URL</text>
  <text x="450" y="58" text-anchor="middle" fill="#8b949e" font-size="12">6 componentes que definen un recurso en la web</text>

  <!-- URL bar -->
  <rect x="30" y="80" width="840" height="48" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="50" y="110" font-family="'Courier New', monospace" font-size="16">
    <tspan fill="#79c0ff">https</tspan><tspan fill="#8b949e">://</tspan><tspan fill="#f0f6fc">api.ejemplo.com</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#3fb950">8443</tspan><tspan fill="#f0f6fc">/v1/users/123</tspan><tspan fill="#f0883e">?active=true</tspan><tspan fill="#8b949e">&amp;</tspan><tspan fill="#f0883e">role=admin</tspan><tspan fill="#d2a8ff">#section</tspan>
  </text>

  <!-- Brackets and labels -->
  <!-- Scheme -->
  <line x1="50" y1="140" x2="50" y2="160" stroke="#79c0ff" stroke-width="1.5"/>
  <line x1="50" y1="160" x2="108" y2="160" stroke="#79c0ff" stroke-width="1.5"/>
  <line x1="108" y1="140" x2="108" y2="160" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="79" y="178" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">esquema</text>

  <!-- Host -->
  <line x1="112" y1="140" x2="112" y2="170" stroke="#f0f6fc" stroke-width="1.5"/>
  <line x1="112" y1="170" x2="262" y2="170" stroke="#f0f6fc" stroke-width="1.5"/>
  <line x1="262" y1="140" x2="262" y2="170" stroke="#f0f6fc" stroke-width="1.5"/>
  <text x="187" y="188" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="bold">host</text>

  <!-- Port -->
  <line x1="265" y1="140" x2="265" y2="160" stroke="#3fb950" stroke-width="1.5"/>
  <line x1="265" y1="160" x2="310" y2="160" stroke="#3fb950" stroke-width="1.5"/>
  <line x1="310" y1="140" x2="310" y2="160" stroke="#3fb950" stroke-width="1.5"/>
  <text x="287" y="178" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">puerto</text>

  <!-- Path -->
  <line x1="313" y1="140" x2="313" y2="180" stroke="#f0f6fc" stroke-width="1.5"/>
  <line x1="313" y1="180" x2="445" y2="180" stroke="#f0f6fc" stroke-width="1.5"/>
  <line x1="445" y1="140" x2="445" y2="180" stroke="#f0f6fc" stroke-width="1.5"/>
  <text x="379" y="198" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="bold">path</text>

  <!-- Query string -->
  <line x1="448" y1="140" x2="448" y2="170" stroke="#f0883e" stroke-width="1.5"/>
  <line x1="448" y1="170" x2="632" y2="170" stroke="#f0883e" stroke-width="1.5"/>
  <line x1="632" y1="140" x2="632" y2="170" stroke="#f0883e" stroke-width="1.5"/>
  <text x="540" y="188" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">query string</text>

  <!-- Fragment -->
  <line x1="636" y1="140" x2="636" y2="160" stroke="#d2a8ff" stroke-width="1.5"/>
  <line x1="636" y1="160" x2="720" y2="160" stroke="#d2a8ff" stroke-width="1.5"/>
  <line x1="720" y1="140" x2="720" y2="160" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="678" y="178" text-anchor="middle" fill="#d2a8ff" font-size="11" font-weight="bold">fragment</text>

  <!-- Details grid -->
  <rect x="30" y="220" width="200" height="115" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="1"/>
  <text x="130" y="243" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="bold">Esquema</text>
  <text x="50" y="265" fill="#8b949e" font-size="11">
    <tspan x="50" dy="0" fill="#f0f6fc">http</tspan><tspan> · puerto 80 (default)</tspan>
    <tspan x="50" dy="18" fill="#f0f6fc">https</tspan><tspan> · puerto 443 (TLS)</tspan>
    <tspan x="50" dy="18" fill="#f0f6fc">ftp</tspan><tspan> · transferencia archivos</tspan>
  </text>

  <rect x="248" y="220" width="230" height="115" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="363" y="243" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Host y Puerto</text>
  <text x="268" y="265" fill="#8b949e" font-size="11">
    <tspan x="268" dy="0">Dominio DNS o IP</tspan>
    <tspan x="268" dy="18" fill="#f0f6fc">api.ejemplo.com</tspan><tspan> → hostname</tspan>
    <tspan x="268" dy="18" fill="#f0f6fc">:8443</tspan><tspan> → puerto explícito</tspan>
    <tspan x="268" dy="18">Omitir = usar default del esquema</tspan>
  </text>

  <rect x="496" y="220" width="185" height="115" rx="6" fill="#161b22" stroke="#f0f6fc" stroke-width="1"/>
  <text x="588" y="243" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="bold">Path</text>
  <text x="516" y="265" fill="#8b949e" font-size="11">
    <tspan x="516" dy="0">Ruta del recurso</tspan>
    <tspan x="516" dy="18" fill="#f0f6fc">/</tspan><tspan> → raíz</tspan>
    <tspan x="516" dy="18" fill="#f0f6fc">/v1/users/123</tspan>
    <tspan x="516" dy="18">Siempre empieza con /</tspan>
  </text>

  <rect x="699" y="220" width="171" height="115" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="784" y="243" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">Query String</text>
  <text x="719" y="265" fill="#8b949e" font-size="11">
    <tspan x="719" dy="0">?clave=valor&amp;clave=valor</tspan>
    <tspan x="719" dy="18">Filtros, paginación, búsqueda</tspan>
    <tspan x="719" dy="18" fill="#f0f6fc">?active=true</tspan><tspan>&amp;</tspan><tspan fill="#f0f6fc">role=admin</tspan>
  </text>

  <!-- Fragment note -->
  <rect x="30" y="323" width="840" height="24" rx="4" fill="#1a1025" stroke="#d2a8ff" stroke-width="1"/>
  <text x="450" y="339" text-anchor="middle" fill="#d2a8ff" font-size="11">
    <tspan fill="#d2a8ff">#fragment</tspan> · lo usa solo el navegador para desplazarse a una sección · <tspan fill="#f0883e">el servidor NUNCA lo recibe</tspan>
  </text>
</svg>
