<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 490" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="490" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Status Codes y Headers HTTP</text>

  <!-- Status Code Groups -->
  <text x="40" y="58" fill="#79c0ff" font-size="14" font-weight="bold">Grupos de Status Codes</text>

  <!-- 1xx -->
  <rect x="40" y="72" width="140" height="70" rx="6" fill="#161b22" stroke="#8b949e" stroke-width="1.5"/>
  <text x="110" y="100" text-anchor="middle" fill="#8b949e" font-size="28" font-weight="bold">1xx</text>
  <text x="110" y="120" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="bold">Informativo</text>
  <text x="110" y="135" text-anchor="middle" fill="#8b949e" font-size="10">Procesando...</text>

  <!-- 2xx -->
  <rect x="192" y="72" width="140" height="70" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="262" y="100" text-anchor="middle" fill="#3fb950" font-size="28" font-weight="bold">2xx</text>
  <text x="262" y="120" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="bold">Éxito</text>
  <text x="262" y="135" text-anchor="middle" fill="#8b949e" font-size="10">200 OK, 201 Created</text>

  <!-- 3xx -->
  <rect x="344" y="72" width="140" height="70" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="2"/>
  <text x="414" y="100" text-anchor="middle" fill="#79c0ff" font-size="28" font-weight="bold">3xx</text>
  <text x="414" y="120" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="bold">Redirección</text>
  <text x="414" y="135" text-anchor="middle" fill="#8b949e" font-size="10">301, 302, 304</text>

  <!-- 4xx -->
  <rect x="496" y="72" width="140" height="70" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="2"/>
  <text x="566" y="100" text-anchor="middle" fill="#f0883e" font-size="28" font-weight="bold">4xx</text>
  <text x="566" y="120" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="bold">Error Cliente</text>
  <text x="566" y="135" text-anchor="middle" fill="#8b949e" font-size="10">400, 401, 403, 404</text>

  <!-- 5xx -->
  <rect x="648" y="72" width="112" height="70" rx="6" fill="#161b22" stroke="#f85149" stroke-width="2"/>
  <text x="704" y="100" text-anchor="middle" fill="#f85149" font-size="28" font-weight="bold">5xx</text>
  <text x="704" y="120" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="bold">Error Serv</text>
  <text x="704" y="135" text-anchor="middle" fill="#8b949e" font-size="10">500, 502, 503</text>

  <!-- Divider -->
  <line x1="40" y1="158" x2="760" y2="158" stroke="#30363d" stroke-width="1"/>

  <!-- Request/Response header diagram -->
  <text x="40" y="180" fill="#79c0ff" font-size="14" font-weight="bold">Intercambio de Headers</text>

  <!-- Request side -->
  <rect x="40" y="195" width="350" height="130" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="215" y="218" text-anchor="middle" fill="#f0883e" font-size="13" font-weight="bold">REQUEST — Lo que envía curl</text>

  <rect x="56" y="233" width="318" height="22" rx="3" fill="#1f2937"/>
  <text x="66" y="248" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">Host: api.ejemplo.com</text>

  <rect x="56" y="260" width="318" height="22" rx="3" fill="#1f2937"/>
  <text x="66" y="275" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">Accept: application/json</text>

  <rect x="56" y="287" width="318" height="22" rx="3" fill="#1f2937"/>
  <text x="66" y="302" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">User-Agent: curl/8.5.0</text>

  <!-- Arrow between -->
  <text x="415" y="260" text-anchor="middle" fill="#8b949e" font-size="22">→</text>

  <!-- Response side -->
  <rect x="430" y="195" width="330" height="130" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="595" y="218" text-anchor="middle" fill="#d2a8ff" font-size="13" font-weight="bold">RESPONSE — Lo que devuelve el servidor</text>

  <rect x="446" y="233" width="298" height="22" rx="3" fill="#1f2937"/>
  <text x="456" y="248" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">content-type: application/json</text>

  <rect x="446" y="260" width="298" height="22" rx="3" fill="#1f2937"/>
  <text x="456" y="275" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">content-length: 1234</text>

  <rect x="446" y="287" width="298" height="22" rx="3" fill="#1f2937"/>
  <text x="456" y="302" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">cache-control: max-age=3600</text>

  <!-- Bottom section: common codes detail -->
  <text x="40" y="358" fill="#79c0ff" font-size="14" font-weight="bold">Códigos más frecuentes</text>

  <rect x="40" y="370" width="175" height="22" rx="3" fill="#0d2f1a" stroke="#3fb950" stroke-width="1"/>
  <text x="127" y="385" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">200 OK · Éxito</text>

  <rect x="222" y="370" width="175" height="22" rx="3" fill="#0d2f1a" stroke="#3fb950" stroke-width="1"/>
  <text x="309" y="385" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">201 Created · POST ok</text>

  <rect x="404" y="370" width="175" height="22" rx="3" fill="#0d2f1a" stroke="#3fb950" stroke-width="1"/>
  <text x="491" y="385" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">204 No Content · DELETE</text>

  <rect x="586" y="370" width="175" height="22" rx="3" fill="#162440" stroke="#79c0ff" stroke-width="1"/>
  <text x="673" y="385" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">301/302 · Redirect</text>

  <rect x="40" y="400" width="175" height="22" rx="3" fill="#2a1a0d" stroke="#f0883e" stroke-width="1"/>
  <text x="127" y="415" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">400 Bad Request</text>

  <rect x="222" y="400" width="175" height="22" rx="3" fill="#2a1a0d" stroke="#f0883e" stroke-width="1"/>
  <text x="309" y="415" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">401 Unauthorized</text>

  <rect x="404" y="400" width="175" height="22" rx="3" fill="#2a1a0d" stroke="#f0883e" stroke-width="1"/>
  <text x="491" y="415" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">404 Not Found</text>

  <rect x="586" y="400" width="175" height="22" rx="3" fill="#2a1a0d" stroke="#f0883e" stroke-width="1"/>
  <text x="673" y="415" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">429 Rate Limit</text>

  <rect x="40" y="430" width="175" height="22" rx="3" fill="#2d0a0a" stroke="#f85149" stroke-width="1"/>
  <text x="127" y="445" text-anchor="middle" fill="#f85149" font-size="11" font-weight="bold">500 Internal Error</text>

  <rect x="222" y="430" width="175" height="22" rx="3" fill="#2d0a0a" stroke="#f85149" stroke-width="1"/>
  <text x="309" y="445" text-anchor="middle" fill="#f85149" font-size="11" font-weight="bold">502 Bad Gateway</text>

  <rect x="404" y="430" width="175" height="22" rx="3" fill="#2d0a0a" stroke="#f85149" stroke-width="1"/>
  <text x="491" y="445" text-anchor="middle" fill="#f85149" font-size="11" font-weight="bold">503 Unavailable</text>

  <!-- curl tip -->
  <rect x="460" y="462" width="300" height="22" rx="4" fill="#162340"/>
  <text x="610" y="478" text-anchor="middle" fill="#79c0ff" font-family="'Courier New', monospace" font-size="11">curl -s -o /dev/null -w "%{http_code}\n" URL</text>
</svg>
