<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="400" fill="#0d1117"/>

  <!-- Cliente box -->
  <rect x="60" y="120" width="200" height="120" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="160" y="170" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="bold">CLIENTE</text>
  <text x="160" y="195" text-anchor="middle" fill="#8b949e" font-size="12">curl / Browser / App</text>
  <text x="160" y="220" text-anchor="middle" fill="#8b949e" font-size="11">(inicia la comunicación)</text>

  <!-- Servidor box -->
  <rect x="540" y="120" width="200" height="120" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="640" y="170" text-anchor="middle" fill="#3fb950" font-size="18" font-weight="bold">SERVIDOR</text>
  <text x="640" y="195" text-anchor="middle" fill="#8b949e" font-size="12">Nginx / Apache / API</text>
  <text x="640" y="220" text-anchor="middle" fill="#8b949e" font-size="11">(responde peticiones)</text>

  <!-- Request arrow (top) -->
  <line x1="260" y1="155" x2="530" y2="155" stroke="#f0883e" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="395" y="143" text-anchor="middle" fill="#f0883e" font-size="13" font-weight="bold">REQUEST →</text>
  <text x="395" y="174" text-anchor="middle" fill="#8b949e" font-size="11">GET /users/123 HTTP/1.1</text>

  <!-- Response arrow (bottom) -->
  <line x1="540" y1="205" x2="270" y2="205" stroke="#d2a8ff" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
  <text x="395" y="225" text-anchor="middle" fill="#d2a8ff" font-size="13" font-weight="bold">← RESPONSE</text>
  <text x="395" y="242" text-anchor="middle" fill="#8b949e" font-size="11">HTTP/1.1 200 OK</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0883e"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d2a8ff"/>
    </marker>
  </defs>

  <!-- Request detail card (bottom-left) -->
  <rect x="60" y="270" width="330" height="100" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="80" y="293" fill="#f0883e" font-size="12" font-weight="bold">COMPONENTES DEL REQUEST</text>
  <text x="80" y="313" fill="#8b949e" font-size="11">
    <tspan x="80" dy="0" fill="#79c0ff">Método</tspan>
    <tspan fill="#8b949e"> · GET, POST, PUT, DELETE, PATCH</tspan>
    <tspan x="80" dy="18" fill="#79c0ff">Path</tspan>
    <tspan fill="#8b949e"> · /recurso/123</tspan>
    <tspan x="80" dy="18" fill="#79c0ff">Headers</tspan>
    <tspan fill="#8b949e"> · metadatos (Accept, Content-Type...)</tspan>
    <tspan x="80" dy="18" fill="#79c0ff">Body</tspan>
    <tspan fill="#8b949e"> · (opcional) datos JSON, XML, form...</tspan>
  </text>

  <!-- Response detail card (bottom-right) -->
  <rect x="410" y="270" width="330" height="100" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="430" y="293" fill="#d2a8ff" font-size="12" font-weight="bold">COMPONENTES DE LA RESPUESTA</text>
  <text x="430" y="313" fill="#8b949e" font-size="11">
    <tspan x="430" dy="0" fill="#79c0ff">Status Code</tspan>
    <tspan fill="#8b949e"> · 200, 404, 500...</tspan>
    <tspan x="430" dy="18" fill="#79c0ff">Version</tspan>
    <tspan fill="#8b949e"> · HTTP/1.1, HTTP/2</tspan>
    <tspan x="430" dy="18" fill="#79c0ff">Headers</tspan>
    <tspan fill="#8b949e"> · Content-Type, Content-Length...</tspan>
    <tspan x="430" dy="18" fill="#79c0ff">Body</tspan>
    <tspan fill="#8b949e"> · JSON, HTML, XML, binario...</tspan>
  </text>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Modelo Cliente-Servidor HTTP</text>
  <text x="400" y="65" text-anchor="middle" fill="#8b949e" font-size="13">Cada interacción HTTP es un ciclo Request → Response independiente (stateless)</text>
</svg>
