<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="450" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Método POST — Enviar datos al servidor</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">POST crea recursos nuevos; envía datos en el body del request</text>

  <!-- Flow diagram -->
  <rect x="60" y="80" width="190" height="60" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="2"/>
  <text x="155" y="106" text-anchor="middle" fill="#f0883e" font-size="14" font-weight="bold">curl</text>
  <text x="155" y="126" text-anchor="middle" fill="#8b949e" font-size="10">cliente HTTP</text>

  <text x="275" y="115" text-anchor="middle" fill="#8b949e" font-size="18">→</text>

  <!-- Request box -->
  <rect x="310" y="70" width="430" height="80" rx="8" fill="#161b22" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="325" y="93" fill="#79c0ff" font-family="'Courier New', monospace" font-size="12" font-weight="bold">POST /posts HTTP/1.1</text>
  <text x="325" y="113" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">Host: jsonplaceholder.typicode.com</text>
  <text x="325" y="133" fill="#3fb950" font-family="'Courier New', monospace" font-size="11">Content-Type: application/json</text>
  <line x1="325" y1="138" x2="725" y2="138" stroke="#30363d" stroke-width="0.5"/>
  <text x="525" y="110" fill="#8b949e" font-family="'Courier New', monospace" font-size="11">{"title":"foo","body":"bar","userId":1}</text>

  <!-- Response -->
  <text x="275" y="175" text-anchor="middle" fill="#8b949e" font-size="18">←</text>
  <rect x="60" y="155" width="190" height="60" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="155" y="181" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="bold">201 Created</text>
  <text x="155" y="201" text-anchor="middle" fill="#8b949e" font-size="10">recurso creado</text>

  <!-- Response body -->
  <rect x="310" y="165" width="430" height="50" rx="6" fill="#0d2f1a" stroke="#3fb950" stroke-width="1"/>
  <text x="325" y="188" fill="#3fb950" font-family="'Courier New', monospace" font-size="11">{"id":101,"title":"foo","body":"bar","userId":1}</text>
  <text x="325" y="206" fill="#8b949e" font-size="10">El servidor asigna un ID</text>

  <!-- Bottom sections -->
  <text x="40" y="250" fill="#79c0ff" font-size="14" font-weight="bold">Formas de enviar el body</text>

  <rect x="40" y="265" width="230" height="100" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="155" y="288" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="bold">Inline (literal)</text>
  <text x="55" y="310" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">curl -d '{"title":"Hola"}'</text>
  <text x="55" y="328" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">  -H "Content-Type: application/json"</text>
  <text x="55" y="346" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">  https://httpbin.org/post</text>

  <rect x="285" y="265" width="230" height="100" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="288" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="bold">Desde archivo</text>
  <text x="300" y="310" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">curl -d @datos.json</text>
  <text x="300" y="328" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">  -H "Content-Type: application/json"</text>
  <text x="300" y="346" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">  https://httpbin.org/post</text>

  <rect x="530" y="265" width="230" height="100" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="645" y="288" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="bold">Desde stdin</text>
  <text x="545" y="310" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">echo '{"x":1}' |</text>
  <text x="545" y="328" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">  curl -d @-</text>
  <text x="545" y="346" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">  -H "Content-Type: ..."</text>

  <!-- Content-Type reminder -->
  <rect x="40" y="385" width="340" height="50" rx="6" fill="#1a1025" stroke="#d2a8ff" stroke-width="1"/>
  <text x="210" y="408" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="bold">Content-Type según formato del body</text>
  <text x="210" y="426" text-anchor="middle" fill="#8b949e" font-size="10">JSON: application/json · Form: application/x-www-form-urlencoded · Multipart: multipart/form-data</text>

  <rect x="400" y="385" width="360" height="50" rx="6" fill="#162340" stroke="#79c0ff" stroke-width="1"/>
  <text x="580" y="408" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="bold">Verificar con httpbin</text>
  <text x="580" y="426" text-anchor="middle" fill="#8b949e" font-size="10">El campo "json" de httpbin muestra si tu JSON fue parseado correctamente</text>
</svg>
