<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="400" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">OPTIONS y HEAD — Verbos de inspección</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Dos verbos que no devuelven body pero revelan información del servidor</text>

  <!-- HEAD section -->
  <rect x="25" y="72" width="365" height="200" rx="8" fill="#161b22" stroke="#79c0ff" stroke-width="2"/>
  <text x="207" y="100" text-anchor="middle" fill="#79c0ff" font-size="20" font-weight="bold">HEAD</text>
  <text x="207" y="118" text-anchor="middle" fill="#8b949e" font-size="11">Como GET pero sin body en la respuesta</text>

  <rect x="45" y="132" width="325" height="55" rx="5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="55" y="150" fill="#f0f6fc" font-size="10">¿Para qué sirve?</text>
  <text x="55" y="166" fill="#8b949e" font-size="10">✓ Verificar si un recurso existe (200 vs 404)</text>
  <text x="55" y="182" fill="#8b949e" font-size="10">✓ Conocer tamaño (Content-Length) y tipo (Content-Type)</text>

  <rect x="45" y="198" width="325" height="28" rx="4" fill="#1f2937"/>
  <text x="60" y="217" fill="#f0f6fc" font-family="'Courier New', monospace" font-size="11">curl -I https://httpbin.org/get</text>

  <rect x="45" y="236" width="325" height="22" rx="3" fill="#162340"/>
  <text x="207" y="251" text-anchor="middle" fill="#79c0ff" font-size="10">Health checks · Validación de existencia · Tamaño de descarga</text>

  <!-- OPTIONS section -->
  <rect x="410" y="72" width="365" height="200" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="592" y="100" text-anchor="middle" fill="#3fb950" font-size="20" font-weight="bold">OPTIONS</text>
  <text x="592" y="118" text-anchor="middle" fill="#8b949e" font-size="11">Pregunta qué métodos acepta el servidor</text>

  <rect x="430" y="132" width="325" height="55" rx="5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="440" y="150" fill="#f0f6fc" font-size="10">¿Para qué sirve?</text>
  <text x="440" y="166" fill="#8b949e" font-size="10">✓ Saber qué métodos permite un endpoint</text>
  <text x="440" y="182" fill="#8b949e" font-size="10">✓ CORS preflight: el browser verifica si puede hacer la petición</text>

  <rect x="430" y="198" width="325" height="28" rx="4" fill="#1f2937"/>
  <text x="445" y="217" fill="#f0f6fc" font-family="'Courier New', monospace" font-size="11">curl -X OPTIONS https://httpbin.org</text>

  <rect x="430" y="236" width="325" height="22" rx="3" fill="#0d2f1a"/>
  <text x="592" y="251" text-anchor="middle" fill="#3fb950" font-size="10">Respuesta típica: Allow: GET, POST, PUT, DELETE, PATCH</text>

  <!-- Bottom comparison -->
  <text x="40" y="305" fill="#79c0ff" font-size="14" font-weight="bold">Comparación: GET vs HEAD vs OPTIONS</text>

  <rect x="40" y="320" width="230" height="65" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="155" y="344" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="bold">GET</text>
  <text x="55" y="364" fill="#3fb950" font-size="10">✓ Body: sí</text>
  <text x="55" y="380" fill="#8b949e" font-size="10">Uso: obtener el recurso completo</text>

  <rect x="285" y="320" width="230" height="65" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="400" y="344" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="bold">HEAD</text>
  <text x="300" y="364" fill="#f85149" font-size="10">✗ Body: no</text>
  <text x="300" y="380" fill="#8b949e" font-size="10">Uso: metadatos, existencia, tamaño</text>

  <rect x="530" y="320" width="230" height="65" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="645" y="344" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">OPTIONS</text>
  <text x="545" y="364" fill="#f85149" font-size="10">✗ Body: no</text>
  <text x="545" y="380" fill="#8b949e" font-size="10">Uso: métodos permitidos, CORS</text>
</svg>
