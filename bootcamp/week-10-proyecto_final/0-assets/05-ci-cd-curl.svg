<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 370" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="370" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">curl en CI/CD</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Automatización: smoke tests, healthchecks Docker, webhooks, GitHub Actions</text>

  <!-- Smoke test -->
  <text x="40" y="82" fill="#79c0ff" font-size="14" font-weight="bold">Smoke test post-deploy (GitHub Actions)</text>
  <rect x="40" y="97" width="720" height="38" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="55" y="115" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">curl -sS -f -o /dev/null -w "%{http_code}" --max-time 10 --retry 3 --retry-delay 5 "$URL"</text>
  <text x="55" y="132" fill="#8b949e" font-size="9">-f → exit 22 en 4xx/5xx · --retry 3 → reintentos · -sS → silencioso + errores · -o /dev/null → descartar body</text>

  <!-- Docker healthcheck -->
  <text x="40" y="162" fill="#79c0ff" font-size="14" font-weight="bold">Docker Compose healthcheck con curl</text>
  <rect x="40" y="177" width="720" height="50" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="1"/>
  <text x="55" y="197" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">healthcheck:</text>
  <text x="55" y="215" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">  test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]</text>
  <text x="55" y="233" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">  interval: 30s, timeout: 5s, retries: 3, start_period: 15s</text>

  <!-- Webhooks -->
  <text x="40" y="255" fill="#79c0ff" font-size="14" font-weight="bold">Webhooks: notificar deploy</text>
  <rect x="40" y="270" width="350" height="40" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="215" y="288" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">Slack notification</text>
  <text x="215" y="306" text-anchor="middle" fill="#8b949e" font-family="'Courier New', monospace" font-size="9">curl -X POST -H "Content-Type: json" -d '{"text":"OK"}' WEBHOOK</text>

  <rect x="410" y="270" width="350" height="40" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1"/>
  <text x="585" y="288" text-anchor="middle" fill="#d2a8ff" font-size="10" font-weight="bold">GitHub repository_dispatch</text>
  <text x="585" y="306" text-anchor="middle" fill="#8b949e" font-family="'Courier New', monospace" font-size="9">curl -X POST -H "Accept: vnd.github" -d '{}' URL/dispatches</text>

  <!-- Patterns summary -->
  <text x="40" y="338" fill="#79c0ff" font-size="14" font-weight="bold">Patrones de automatización</text>
  <rect x="40" y="350" width="720" height="18" rx="3" fill="#162340"/>
  <text x="60" y="363" fill="#8b949e" font-size="10">Smoke test → Docker healthcheck → Webhook → Retry loop → Multi-test script con contadores pass/fail</text>
</svg>
