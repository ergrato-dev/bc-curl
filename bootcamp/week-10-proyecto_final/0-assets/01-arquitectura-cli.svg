<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="380" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Arquitectura de CLI Profesional en Bash</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">6 principios para herramientas CLI robustas y mantenibles</text>

  <!-- Principles -->
  <text x="40" y="82" fill="#79c0ff" font-size="14" font-weight="bold">Principios de diseño</text>

  <rect x="40" y="97" width="228" height="50" rx="5" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="154" y="117" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">1. Propósito claro</text>
  <text x="154" y="137" text-anchor="middle" fill="#8b949e" font-size="9">hace una cosa bien</text>

  <rect x="282" y="97" width="228" height="50" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="396" y="117" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">2. Pipe-componible</text>
  <text x="396" y="137" text-anchor="middle" fill="#8b949e" font-size="9">stdout = datos, stderr = logs</text>

  <rect x="524" y="97" width="236" height="50" rx="5" fill="#161b22" stroke="#79c0ff" stroke-width="1"/>
  <text x="642" y="117" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">3. Exit codes predecibles</text>
  <text x="642" y="137" text-anchor="middle" fill="#8b949e" font-size="9">0=ok, 1=error, 2=uso</text>

  <rect x="40" y="160" width="228" height="50" rx="5" fill="#161b22" stroke="#d2a8ff" stroke-width="1"/>
  <text x="154" y="180" text-anchor="middle" fill="#d2a8ff" font-size="11" font-weight="bold">4. Config externa</text>
  <text x="154" y="200" text-anchor="middle" fill="#8b949e" font-size="9">env vars, archivo, flags</text>

  <rect x="282" y="160" width="228" height="50" rx="5" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="396" y="180" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">5. --help siempre</text>
  <text x="396" y="200" text-anchor="middle" fill="#8b949e" font-size="9">primera línea de defensa</text>

  <rect x="524" y="160" width="236" height="50" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="642" y="180" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">6. Testeable</text>
  <text x="642" y="200" text-anchor="middle" fill="#8b949e" font-size="9">main "$@" exportable</text>

  <!-- Structure -->
  <text x="40" y="240" fill="#79c0ff" font-size="14" font-weight="bold">Estructura de secciones</text>
  <rect x="40" y="255" width="720" height="55" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="55" y="275" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">// Utils (log, die, usage) → Config (load_config, constants) → Auth (login, token)</text>
  <text x="55" y="295" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">→ Requests (get, post, etc.) → Advanced (monitor, bench) → Dispatch (main + case)</text>

  <!-- Scaffolding -->
  <rect x="40" y="328" width="340" height="42" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="210" y="346" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">set -euo pipefail</text>
  <text x="210" y="364" text-anchor="middle" fill="#8b949e" font-size="9">obligatorio: error en vars no def, pipeline, exit</text>

  <rect x="400" y="328" width="360" height="42" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="1"/>
  <text x="580" y="346" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">main "$@" para testability</text>
  <text x="580" y="364" text-anchor="middle" fill="#8b949e" font-size="9">source script.sh && main subcomando args</text>
</svg>
