<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 410" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="410" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Autenticación en APIs REST</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Identidad + permisos: dos conceptos que todo request debe resolver</text>

  <!-- Auth vs Authz -->
  <rect x="25" y="72" width="365" height="100" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="2"/>
  <text x="207" y="100" text-anchor="middle" fill="#f0883e" font-size="16" font-weight="bold">Autenticación</text>
  <text x="207" y="120" text-anchor="middle" fill="#8b949e" font-size="12">¿Quién sos?</text>
  <text x="45" y="145" fill="#8b949e" font-size="11">Verifica la identidad del que hace el request</text>
  <text x="45" y="162" fill="#8b949e" font-size="11">→ Usuario + contraseña, token, API key</text>

  <rect x="410" y="72" width="365" height="100" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="2"/>
  <text x="592" y="100" text-anchor="middle" fill="#d2a8ff" font-size="16" font-weight="bold">Autorización</text>
  <text x="592" y="120" text-anchor="middle" fill="#8b949e" font-size="12">¿Qué podés hacer?</text>
  <text x="430" y="145" fill="#8b949e" font-size="11">Verifica los permisos sobre un recurso</text>
  <text x="430" y="162" fill="#8b949e" font-size="11">→ Roles, scopes, políticas de acceso</text>

  <!-- Arrow -->
  <text x="395" y="128" text-anchor="middle" fill="#8b949e" font-size="18">→</text>

  <!-- Flow -->
  <text x="40" y="205" fill="#79c0ff" font-size="14" font-weight="bold">Flujo de autenticación</text>

  <rect x="40" y="220" width="150" height="40" rx="5" fill="#161b22" stroke="#8b949e" stroke-width="1"/>
  <text x="115" y="237" text-anchor="middle" fill="#8b949e" font-size="11">Request sin auth</text>
  <text x="115" y="253" text-anchor="middle" fill="#f85149" font-size="10">→ 401 Unauthorized</text>

  <text x="205" y="243" fill="#8b949e" font-size="16">→</text>

  <rect x="220" y="220" width="150" height="40" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="295" y="237" text-anchor="middle" fill="#3fb950" font-size="11">Login / credenciales</text>
  <text x="295" y="253" text-anchor="middle" fill="#3fb950" font-size="10">→ 200 + token</text>

  <text x="385" y="243" fill="#8b949e" font-size="16">→</text>

  <rect x="400" y="220" width="150" height="40" rx="5" fill="#161b22" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="475" y="237" text-anchor="middle" fill="#79c0ff" font-size="11">Request con token</text>
  <text x="475" y="253" text-anchor="middle" fill="#3fb950" font-size="10">→ 200 OK (datos)</text>

  <text x="565" y="243" fill="#8b949e" font-size="16">→</text>

  <rect x="580" y="220" width="180" height="40" rx="5" fill="#161b22" stroke="#f85149" stroke-width="1"/>
  <text x="670" y="237" text-anchor="middle" fill="#f85149" font-size="11">Token expirado / sin permiso</text>
  <text x="670" y="253" text-anchor="middle" fill="#f85149" font-size="10">→ 401 o 403 Forbidden</text>

  <!-- Three mechanisms -->
  <text x="40" y="295" fill="#79c0ff" font-size="14" font-weight="bold">Mecanismos de autenticación</text>

  <rect x="40" y="310" width="230" height="85" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="155" y="335" text-anchor="middle" fill="#f0883e" font-size="13" font-weight="bold">HTTP Basic Auth</text>
  <text x="55" y="355" fill="#8b949e" font-size="10">Authorization: Basic base64(user:pass)</text>
  <text x="55" y="373" fill="#8b949e" font-size="10">Simple, requiere HTTPS, curl -u user:pass</text>
  <text x="55" y="390" fill="#8b949e" font-size="10">Uso: APIs internas, CI/CD, prototipos</text>

  <rect x="285" y="310" width="230" height="85" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="400" y="335" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="bold">API Key</text>
  <text x="300" y="355" fill="#8b949e" font-size="10">X-API-Key: sk-abc123...</text>
  <text x="300" y="373" fill="#8b949e" font-size="10">Identifica aplicación, no usuario</text>
  <text x="300" y="390" fill="#8b949e" font-size="10">Uso: servicios externos, webhooks</text>

  <rect x="530" y="310" width="245" height="85" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="652" y="335" text-anchor="middle" fill="#79c0ff" font-size="13" font-weight="bold">Bearer Token / JWT</text>
  <text x="545" y="355" fill="#8b949e" font-size="10">Authorization: Bearer eyJ...</text>
  <text x="545" y="373" fill="#8b949e" font-size="10">Token temporal, login previo</text>
  <text x="545" y="390" fill="#8b949e" font-size="10">Uso: apps con usuarios, OAuth2</text>
</svg>
