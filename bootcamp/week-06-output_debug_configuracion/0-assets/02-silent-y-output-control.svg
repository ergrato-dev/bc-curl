<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 390" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="390" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Control de Output: Silent, -o y streams</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Separar body, headers, métricas y errores para scripts limpios</text>

  <!-- Output streams diagram -->
  <rect x="60" y="75" width="160" height="50" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="140" y="98" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">curl</text>
  <text x="140" y="118" text-anchor="middle" fill="#8b949e" font-size="10">ejecución</text>

  <!-- stdout -->
  <line x1="220" y1="92" x2="300" y2="92" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arGrn)"/>
  <rect x="305" y="75" width="180" height="35" rx="5" fill="#0d2f1a" stroke="#3fb950" stroke-width="1"/>
  <text x="395" y="92" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">stdout (fd 1)</text>
  <text x="395" y="106" text-anchor="middle" fill="#8b949e" font-size="9">body + -w output</text>

  <!-- stderr -->
  <line x1="220" y1="112" x2="300" y2="112" stroke="#f85149" stroke-width="1.5" marker-end="url(#arRed)"/>
  <rect x="305" y="112" width="180" height="35" rx="5" fill="#2d0a0a" stroke="#f85149" stroke-width="1"/>
  <text x="395" y="129" text-anchor="middle" fill="#f85149" font-size="10" font-weight="bold">stderr (fd 2)</text>
  <text x="395" y="143" text-anchor="middle" fill="#8b949e" font-size="9">progreso + errores + -v</text>

  <!-- body to file -->
  <line x1="220" y1="130" x2="300" y2="160" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arBlu)"/>
  <rect x="520" y="75" width="240" height="35" rx="5" fill="#161b22" stroke="#79c0ff" stroke-width="1"/>
  <text x="640" y="92" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="bold">-o archivo / -o /dev/null</text>
  <text x="640" y="106" text-anchor="middle" fill="#8b949e" font-size="9">body a archivo o descartado</text>

  <defs>
    <marker id="arGrn" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#3fb950"/>
    </marker>
    <marker id="arRed" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#f85149"/>
    </marker>
    <marker id="arBlu" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#79c0ff"/>
    </marker>
  </defs>

  <!-- Flags grid -->
  <text x="40" y="190" fill="#79c0ff" font-size="14" font-weight="bold">Flags de control de output</text>

  <rect x="40" y="205" width="160" height="45" rx="5" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="120" y="225" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">-s</text>
  <text x="120" y="243" text-anchor="middle" fill="#8b949e" font-size="9">silent (sin progreso)</text>

  <rect x="212" y="205" width="160" height="45" rx="5" fill="#161b22" stroke="#f85149" stroke-width="1"/>
  <text x="292" y="225" text-anchor="middle" fill="#f85149" font-size="11" font-weight="bold">-S</text>
  <text x="292" y="243" text-anchor="middle" fill="#8b949e" font-size="9">show-error (con -s)</text>

  <rect x="384" y="205" width="160" height="45" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="464" y="225" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">-o file</text>
  <text x="464" y="243" text-anchor="middle" fill="#8b949e" font-size="9">body a archivo</text>

  <rect x="556" y="205" width="204" height="45" rx="5" fill="#161b22" stroke="#79c0ff" stroke-width="1"/>
  <text x="658" y="225" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">-D file</text>
  <text x="658" y="243" text-anchor="middle" fill="#8b949e" font-size="9">headers a archivo</text>

  <!-- Recipes -->
  <text x="40" y="280" fill="#79c0ff" font-size="14" font-weight="bold">Recetas para scripts</text>

  <rect x="40" y="295" width="720" height="24" rx="4" fill="#1f2937"/>
  <text x="55" y="311" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" URL)          ← solo status code</text>

  <rect x="40" y="326" width="720" height="24" rx="4" fill="#1f2937"/>
  <text x="55" y="342" fill="#8b949e" font-family="'Courier New', monospace" font-size="10">curl -s -D headers.txt -o body.json URL                             ← separar headers y body</text>

  <rect x="40" y="357" width="720" height="24" rx="4" fill="#162340"/>
  <text x="55" y="373" fill="#79c0ff" font-size="10">Regla: en scripts usar siempre -sS (silencioso + errores) — nunca -s solo</text>
</svg>
