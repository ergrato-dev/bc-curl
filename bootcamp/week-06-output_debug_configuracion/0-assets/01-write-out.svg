<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 390" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="390" fill="#0d1117"/>

  <text x="400" y="32" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">--write-out: Extraer métricas de transferencia</text>
  <text x="400" y="52" text-anchor="middle" fill="#8b949e" font-size="12">El flag -w permite extraer variables como http_code, time_total, size_download</text>

  <!-- Command -->
  <rect x="40" y="72" width="720" height="42" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="60" y="95" fill="#8b949e" font-family="'Courier New', monospace" font-size="12">curl -s -o /dev/null -w "HTTP %{http_code} en %{time_total}s — %{size_download} bytes\n" URL</text>

  <!-- Variables grid -->
  <text x="40" y="142" fill="#79c0ff" font-size="14" font-weight="bold">Variables principales</text>

  <rect x="40" y="155" width="228" height="50" rx="5" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="154" y="176" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">%{http_code}</text>
  <text x="154" y="195" text-anchor="middle" fill="#8b949e" font-size="10">200, 404, 500...</text>

  <rect x="282" y="155" width="228" height="50" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="396" y="176" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">%{time_total}</text>
  <text x="396" y="195" text-anchor="middle" fill="#8b949e" font-size="10">tiempo total (seg)</text>

  <rect x="524" y="155" width="236" height="50" rx="5" fill="#161b22" stroke="#79c0ff" stroke-width="1"/>
  <text x="642" y="176" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">%{time_starttransfer}</text>
  <text x="642" y="195" text-anchor="middle" fill="#8b949e" font-size="10">TTFB — primer byte</text>

  <rect x="40" y="218" width="228" height="50" rx="5" fill="#161b22" stroke="#d2a8ff" stroke-width="1"/>
  <text x="154" y="239" text-anchor="middle" fill="#d2a8ff" font-size="11" font-weight="bold">%{size_download}</text>
  <text x="154" y="258" text-anchor="middle" fill="#8b949e" font-size="10">bytes del body</text>

  <rect x="282" y="218" width="228" height="50" rx="5" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="396" y="239" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">%{time_connect}</text>
  <text x="396" y="258" text-anchor="middle" fill="#8b949e" font-size="10">conexión TCP (seg)</text>

  <rect x="524" y="218" width="236" height="50" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="642" y="239" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">%{url_effective}</text>
  <text x="642" y="258" text-anchor="middle" fill="#8b949e" font-size="10">URL final post-redirect</text>

  <!-- stderr trick -->
  <text x="40" y="298" fill="#79c0ff" font-size="14" font-weight="bold">Separar métricas del body</text>
  <rect x="40" y="313" width="350" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="215" y="330" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="bold">%{stderr} prefijo</text>
  <text x="215" y="348" text-anchor="middle" fill="#8b949e" font-family="'Courier New', monospace" font-size="9">curl -o body.json -w "%{stderr}Metrics..." URL</text>

  <rect x="410" y="313" width="350" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="585" y="330" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="bold">Redirección bash</text>
  <text x="585" y="348" text-anchor="middle" fill="#8b949e" font-family="'Courier New', monospace" font-size="9">curl -s URL 2>metrics.txt   (stderr → archivo)</text>

  <!-- Benchmark tip -->
  <rect x="40" y="365" width="720" height="20" rx="3" fill="#162340"/>
  <text x="60" y="379" fill="#79c0ff" font-size="10">Usá -w para healthchecks, benchmarks y logging: una sola request = todas las métricas que necesitás</text>
</svg>
